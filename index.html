<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 - Gomoku</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>五子棋</h1>
        <div class="game-info">
            <div class="current-player">
                当前玩家：<span id="currentPlayer">⚫ 黑子</span>
            </div>
            <div class="score">
                <span>黑子：<span id="blackScore">0</span></span>
                <span>白子：<span id="whiteScore">0</span></span>
            </div>
        </div>
        <canvas id="gameBoard" width="600" height="600"></canvas>
        <div class="controls">
            <button id="restartBtn">重新开始</button>
            <button id="undoBtn">悔棋</button>
        </div>
        <div id="winnerMessage" class="winner-message"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
